services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./services/backend
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/?retryWrites=true&w=majority"
      DATABASE_NAME: "ead_ca2"
      DATABASE_COLLECTION: "ead_2024"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    container_name: frontend
    ports:
      - "22137:22137"
    depends_on:
      - backend
    volumes:
      # Override config so FE points at the backend container, not localhost
      - ./services/frontend/config/config.docker.json:/app/config/config.json:ro

volumes:
  mongo-data: