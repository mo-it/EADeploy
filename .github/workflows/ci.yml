name: CI Build Test Security Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t ead-backend:${{ github.sha }} ./services/backend

      - name: Build frontend Docker image
        run: docker build -t ead-frontend:${{ github.sha }} ./services/frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ead-backend:${{ github.sha }}
          format: table
          output: backend-trivy-report.txt
          severity: CRITICAL,HIGH

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ead-frontend:${{ github.sha }}
          format: table
          output: frontend-trivy-report.txt
          severity: CRITICAL,HIGH

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
        name: trivy-reports
        path: |
         backend-trivy-report.txt
         frontend-trivy-report.txt

      - name: Simulated CD release commands
        run: |
          echo "CD stage documented for AKS release:"
          echo "docker push ACR/ead-backend:${{ github.sha }}"
          echo "docker push ACR/ead-frontend:${{ github.sha }}"
          echo "kubectl set image deployment/backend backend=ACR/ead-backend:${{ github.sha }} -n production"
          echo "kubectl set image deployment/frontend frontend=ACR/ead-frontend:${{ github.sha }} -n production"
          echo "kubectl rollout status deployment/backend -n production"
          echo "kubectl rollout status deployment/frontend -n production"